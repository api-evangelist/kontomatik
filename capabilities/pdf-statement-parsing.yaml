id: kontomatik-pdf-statement-parsing
name: Kontomatik PDF Statement Parsing
description: |
  Parse Polish bank statement and transaction confirmation PDFs into
  structured owner, account, and transaction data. Standard mode enforces
  verification; trusted mode returns data even on verification failures.
provider: kontomatik
api: kontomatik-pdf-parsing-api
operations:
- operationId: parseStatement
- operationId: parseStatementTrusted
- operationId: listStatements
- operationId: parseConfirmation
- operationId: parseConfirmationTrusted
- operationId: getPdfCatalog
inputs:
- name: pdf
  description: Binary statement or confirmation PDF.
- name: ownerExternalId
- name: password
  description: Optional password for encrypted PDFs.
outputs:
- name: statementId
- name: accounts
- name: transactions
- name: failedVerifications
tags:
- PDFParsing
- BankStatement
- DocumentAI
- Poland
