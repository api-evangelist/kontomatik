description: >-
  Kontomatik is a Warsaw- and Vilnius-based PSD2-licensed open banking provider delivering bank data aggregation, KYC,
  credit scoring, income verification, transaction labeling, and PDF statement parsing across Central and Eastern Europe
  (Poland, Czech Republic, Romania, Lithuania, Latvia, Estonia) and Iberia (Spain, Portugal). The platform combines an
  Account Information Service (AIS) with Single, Multiple, and Mixed access modes, Polish-bank PDF parsing in standard
  and trusted modes, and an analytical stack (labeling, vendor recognition, scoring, profiling, data summary, income
  confirmation) plus the Kontomatik Report. Operations are managed through the Insight client portal with API-key
  issuance, IP whitelisting, role-based access, and 2FA.
