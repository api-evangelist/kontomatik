apis:
  - aid: kontomatik:kontomatik-ais-api
    name: Kontomatik Account Information Service API
    tags:
      - Open Banking
      - PSD2
      - AIS
      - Bank Data
    humanURL: https://developer.kontomatik.com/docs/
    properties:
      - url: https://developer.kontomatik.com/first-steps/api-overview/
        type: Documentation
      - url: https://developer.kontomatik.com/docs/
        type: Documentation
      - url: openapi/kontomatik-ais-api-openapi.yml
        type: OpenAPI
      - url: json-schema/kontomatik-owner-schema.json
        type: JSONSchema
      - url: json-schema/kontomatik-account-schema.json
        type: JSONSchema
      - url: json-schema/kontomatik-transaction-schema.json
        type: JSONSchema
      - url: json-ld/kontomatik-context.jsonld
        type: JSONLD
    description: >-
      PSD2-regulated Account Information Service for connecting end-user bank accounts across Poland, Czech Republic,
      Spain, Portugal, Romania, Lithuania, Latvia, and Estonia. Supports Single Access (one-time fetch), Multiple Access
      (up to 180-day consent tokens), and Mixed Access. Includes redirection SignIn Flow, background import commands,
      consent revocation, and a KontoBank mock-bank sandbox.
  - aid: kontomatik:kontomatik-pdf-parsing-api
    name: Kontomatik PDF Parsing API
    tags:
      - PDF Parsing
      - Document AI
      - Bank Statements
      - Poland
    humanURL: https://developer.kontomatik.com/docs/
    properties:
      - url: https://developer.kontomatik.com/docs/
        type: Documentation
      - url: openapi/kontomatik-pdf-parsing-api-openapi.yml
        type: OpenAPI
      - url: examples/kontomatik-pdf-statement-example.json
        type: Examples
    description: >-
      Extract structured owner, account, and transaction data from Polish bank statement and transaction confirmation
      PDFs. Offers standard mode (rejects on verification failures) and trusted mode (returns data even when
      verification fails), plus a per-owner history endpoint and the PDF coverage catalog.
  - aid: kontomatik:kontomatik-data-analysis-api
    name: Kontomatik Data Analysis API
    tags:
      - Transaction Labeling
      - Credit Scoring
      - Income Verification
      - Profiling
      - Machine Learning
    humanURL: https://developer.kontomatik.com/docs/
    properties:
      - url: https://developer.kontomatik.com/docs/
        type: Documentation
      - url: openapi/kontomatik-data-analysis-api-openapi.yml
        type: OpenAPI
      - url: examples/kontomatik-score-example.json
        type: Examples
      - url: json-structure/kontomatik-owner-graph-structure.json
        type: JSONStructure
    description: >-
      ML-powered analytical services on top of imported bank data — transaction labeling, vendor recognition (beta),
      credit scoring with repayment probability, behavioral profiling (beta), owner features, data summaries by
      category, income confirmation across four configurable timespans, external-data labeling for non-bank
      transactions, cross-source aggregation, and owner data deletion.
  - aid: kontomatik:kontomatik-report-api
    name: Kontomatik Report API
    tags:
      - Reporting
      - Beta
      - Bank Data
    humanURL: https://developer.kontomatik.com/docs/
    properties:
      - url: https://developer.kontomatik.com/docs/
        type: Documentation
      - url: openapi/kontomatik-report-api-openapi.yml
        type: OpenAPI
    description: >-
      Create, list, and retrieve shareable Kontomatik Report tokens that bundle imported AIS and PDF data together with
      the analytical outputs into authenticated, time-bound deliverables (beta).
